version: v1
# Application name (must match nova-build.yaml)
name: "f27mas-test-fs-app"

# Target image (updated by build workflow in app-hub)
target: "nova-apps/f27mas-test-fs-app:1.0.2"

sources:
  # Application image (updated by build workflow in app-hub)
  app: "f27mas-test-fs-app:1.0.2"

defaults:
  # these 2 parameters will be overridden by enclaver runtime with exact values
  cpu_count: 2
  memory_mb: 1024
ingress:
  - listen_port: 8000
  - listen_port: 18001

egress:
  allow:
    - '**'
    - 0.0.0.0/0
    - ::/0


api:
  listen_port: 18000
aux_api:
  listen_port: 18001
# S3 Storage Configuration
storage:
  s3:
    enabled: false
    bucket: "nova-app-storage-prod"
    prefix: "apps/f27mas/"
    region: "us-west-1"
    encryption:
      mode: "plaintext"
      key_scope: "object"
      aad_mode: "key"
      key_version: "v1"
      accept_plaintext: true
  mounts:
    - name: appdata
      mount_path: /mnt/appdata
      required: true
      size_mb: 10240


kms_integration:
  enabled: false
  use_app_wallet: false
  kms_app_id: 49
  nova_app_registry: "0x0f68E6e699f2E972998a1EcC000c7ce103E64cc8"

